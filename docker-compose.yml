services:
  frontend:
    build:
      context: ./frontend
    command: ["sh", "-c", "rm -f .astro/dev.json && npm run dev"]
    env_file:
      - path: ./frontend/.env.local
        required: false
    environment:
      API_PROXY_TARGET: "http://api:8080"
    ports:
      - "4321:4321"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - api

  api:
    build:
      context: ./server/api
    env_file:
      - path: ./server/api/.env.local
        required: false
    environment:
      HTTP_ADDR: ":8080"
      BASE_URL: "http://localhost:8080"
      AUTH_DISABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./server/api:/app
      - ~/.aws:/root/.aws:ro
      - go-mod-cache:/go/pkg/mod

volumes:
  frontend-node-modules:
  go-mod-cache:
