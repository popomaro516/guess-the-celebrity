name: Feed Worker

on:
  pull_request:
    paths:
      - ".github/workflows/feed-worker.yml"
      - "server/feed-worker/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/feed-worker.yml"
      - "server/feed-worker/**"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-1
  LAMBDA_FUNCTION_ARN: arn:aws:lambda:ap-northeast-1:652992946895:function:guess_the_celebrity_quizset_gen_worker

jobs:
  build:
    name: Build Lambda package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/feed-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: server/feed-worker/go.sum

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -race ./...

      - name: Build Lambda bootstrap
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags lambda.norpc -o bootstrap ./cmd/feed-worker

      - name: Package Lambda
        run: |
          mkdir -p ../../dist
          zip -q ../../dist/lambda-feed-worker.zip bootstrap

      - name: Upload Lambda package artifact
        uses: actions/upload-artifact@v4
        with:
          name: feed-worker-lambda-package
          path: dist/lambda-feed-worker.zip
          if-no-files-found: error

  deploy:
    name: Deploy Lambda
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download Lambda package artifact
        uses: actions/download-artifact@v4
        with:
          name: feed-worker-lambda-package
          path: dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::652992946895:role/guess_the_celebrity_lambda_cd
          role-session-name: github-actions-feed-worker-cd

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_ARN" \
            --zip-file fileb://dist/lambda-feed-worker.zip
          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION_ARN"
