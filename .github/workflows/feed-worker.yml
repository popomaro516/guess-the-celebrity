name: Feed Worker

on:
  pull_request:
    paths:
      - ".github/workflows/feed-worker.yml"
      - "server/feed-worker/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/feed-worker.yml"
      - "server/feed-worker/**"

permissions:
  contents: read

jobs:
  build:
    name: Build Lambda package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/feed-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: server/feed-worker/go.sum

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -race ./...

      - name: Build Lambda bootstrap
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags lambda.norpc -o bootstrap ./cmd/feed-worker

      - name: Package Lambda
        run: |
          mkdir -p ../../dist
          zip -q ../../dist/lambda-feed-worker.zip bootstrap

      - name: Upload Lambda package artifact
        uses: actions/upload-artifact@v4
        with:
          name: feed-worker-lambda-package
          path: dist/lambda-feed-worker.zip
          if-no-files-found: error
