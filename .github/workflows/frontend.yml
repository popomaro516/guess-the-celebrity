name: Frontend

on:
  pull_request:
    paths:
      - ".github/workflows/frontend.yml"
      - "frontend/**"
      - "amplify.yml"
      - "docker-compose.yml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/frontend.yml"
      - "frontend/**"
      - "amplify.yml"
      - "docker-compose.yml"

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Oxlint
        run: npm run lint

      - name: Type-check and build
        run: npm run build
